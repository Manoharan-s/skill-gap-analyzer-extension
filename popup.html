<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <title>Skill Gap Analyser</title>
</head>
<body>
   
        
        <button id="closeBtn">&times;</button>
        <h2>Skill Gap Analyser</h2>
    <textarea
  id="skills"
  placeholder="Enter your skills (java,python)"
></textarea>
  <div class="button-container">
    <button id="saveBtn">Save Skills</button>
    <button id="analysebtn">
      <img id ="ds" src="icons/ChatGPT Image Jun 26, 2026, 06_46_11 PM.png"/>
      <span>Analyze</span>
    </button>
</div>
    <div id="result" style="display:none;">

    <table id="skillsTable">

        <thead>
            <tr>
                <th>Matched Skills</th>
                <th>Missing Skills</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td id="matchedSkills"></td>
                <td id="unmatchedSkills"></td>
            </tr>
        </tbody>

    </table>

</div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
    
</body>
</html>
